services:
  workspace-fix:
    image: alpine:latest
    container_name: openclaw-workspace-fix
    user: root
    volumes:
      - openclaw_workspace:/workspace
    command: ["sh", "-lc", "chown -R 1000:1000 /workspace"]

  openclaw-gateway:
    build: .
    image: openclaw-minimax-ssh:latest
    container_name: openclaw-main
    restart: unless-stopped
    depends_on:
      workspace-fix:
        condition: service_completed_successfully
    init: true
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "true"
      PATH: "/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      LARK_APP_ID: ${LARK_APP_ID}
      LARK_APP_SECRET: ${LARK_APP_SECRET}
    volumes:
      - ./openclaw_data:/home/node/.openclaw
      - ${HOME}/.ssh:/home/node/.ssh:ro
      - openclaw_workspace:/home/node/.openclaw/workspace
    ports:
      - "18789:18789"
      - "18790:18790"
      - "9222:9222"
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]

  headless-shell:
    image: crpi-a1liy20beodq2bdl.cn-beijing.personal.cr.aliyuncs.com/bujic/headless-shell:latest
    container_name: headless-shell
    network_mode: "service:openclaw-gateway"
    restart: unless-stopped
    shm_size: "2g"

volumes:
  openclaw_workspace:
