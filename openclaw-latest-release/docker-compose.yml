services:
  workspace-fix:
    image: alpine:latest
    container_name: openclaw-latest-workspace-fix
    user: root
    volumes:
      - ./openclaw_data/workspace:/workspace
    command: ["sh", "-lc", "chown -R 1000:1000 /workspace"]

  pinchtab:
    image: ${PINCHTAB_IMAGE_NAME:-registry.cn-shenzhen.aliyuncs.com/yihuzh/pinchtab:latest}
    container_name: openclaw-latest-pinchtab
    restart: unless-stopped
    ports:
      - "9867:9867"
    environment:
      PINCHTAB_TOKEN: ${PINCHTAB_TOKEN:-}
    volumes:
      - pinchtab-data:/data
    shm_size: "2gb"
    read_only: true
    tmpfs:
      - /tmp:size=512m,noexec,nosuid,nodev
      - /run:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pinchtab health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE_NAME:-registry.cn-shenzhen.aliyuncs.com/yihuzh/openclaw:latest}
    container_name: openclaw-latest-gateway
    restart: unless-stopped
    depends_on:
      workspace-fix:
        condition: service_completed_successfully
      pinchtab:
        condition: service_healthy
    init: true
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "true"
      PATH: "/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      PINCHTAB_URL: ${PINCHTAB_URL:-http://pinchtab:9867}
      PINCHTAB_TOKEN: ${PINCHTAB_TOKEN:-}
    volumes:
      - ./openclaw_data:/home/node/.openclaw
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ${HOME}/.ssh:/home/node/.ssh:ro
      - ./openclaw_data/workspace:/home/node/.openclaw/workspace
      - ../pinchtab/plugin:/opt/openclaw-local-plugins/pinchtab-src:ro
    ports:
      - "18889:18889"
      - "18890:18890"
      - "19222:19222"
    command:
      [
        "sh",
        "-lc",
        "node openclaw.mjs plugins install /opt/openclaw-local-plugins/pinchtab-src && exec node openclaw.mjs gateway --bind lan --port 18889 --allow-unconfigured",
      ]

volumes:
  pinchtab-data:
