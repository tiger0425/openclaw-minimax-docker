# OpenClaw 远程部署配置
# 所有镜像从阿里云 ACR 拉取，无需本地构建

services:
  workspace-fix:
    image: alpine:latest
    container_name: openclaw-workspace-fix
    user: root
    volumes:
      - ./openclaw_data/workspace:/workspace
    command: ["sh", "-lc", "chown -R 1000:1000 /workspace"]

  openspace-skills-fix:
    image: alpine:latest
    container_name: openclaw-openspace-skills-fix
    user: root
    volumes:
      - openspace-skills:/skills
    command: ["sh", "-lc", "mkdir -p /skills && chown -R 1000:1000 /skills"]

  pinchtab:
    image: ${PINCHTAB_IMAGE_NAME:-registry.cn-shenzhen.aliyuncs.com/yihuzh/pinchtab:latest}
    container_name: openclaw-pinchtab
    restart: unless-stopped
    environment:
      PINCHTAB_TOKEN: ${PINCHTAB_TOKEN:-}
    volumes:
      - pinchtab-data:/data
    shm_size: "2gb"
    read_only: true
    tmpfs:
      - /tmp:size=512m,noexec,nosuid,nodev
      - /run:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pinchtab health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE_NAME:-registry.cn-shenzhen.aliyuncs.com/yihuzh/openclaw:latest}
    container_name: openclaw-gateway
    restart: unless-stopped
    depends_on:
      workspace-fix:
        condition: service_completed_successfully
      openspace-skills-fix:
        condition: service_completed_successfully
      pinchtab:
        condition: service_healthy
    init: true
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "true"
      OPENCLAW_GATEWAY_PORT: "18889"
      LD_LIBRARY_PATH: "/data/openclaw-deploy-latest/.venv-openspace/lib"
      PATH: "/home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      PINCHTAB_URL: ${PINCHTAB_URL:-http://pinchtab:9867}
      PINCHTAB_TOKEN: ${PINCHTAB_TOKEN:-}
      OPENSPACE_API_KEY: ${OPENSPACE_API_KEY:-}
    volumes:
      - ./openclaw_data:/home/node/.openclaw
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ./openclaw_data/workspace:/home/node/.openclaw/workspace
      - ./pinchtab-plugin:/opt/openclaw-local-plugins/pinchtab-src:ro
      - ./skill:/home/node/.openclaw/extensions/skill:ro
      - ./openspace-host-skills:/opt/openspace-host-skills:ro
      - ./.venv-openspace:/data/openclaw-deploy-latest/.venv-openspace
      - ./.venv-openspace/lib/python3.12:/usr/local/lib/python3.12:ro
      - ./.venv-openspace/lib/libpython3.12.so.1.0:/usr/local/lib/libpython3.12.so.1.0:ro
      - openspace-skills:/home/node/.openclaw/skills
      - openspace-workspace:/opt/openspace
    ports:
      - "18889:18889"
      - "18890:18890"
      - "19222:19222"
    command:
      [
        "sh",
        "-lc",
        "cp -rn /opt/openspace-host-skills/* /home/node/.openclaw/skills/ 2>/dev/null; npx -y mcporter config add openspace --command '/data/openclaw-deploy-latest/.venv-openspace/bin/openspace-mcp' --env OPENSPACE_HOST_SKILL_DIRS=/home/node/.openclaw/skills --env OPENSPACE_WORKSPACE=/opt/openspace --env OPENSPACE_API_KEY=\"$OPENSPACE_API_KEY\" --env OPENSPACE_MODEL=\"$OPENSPACE_MODEL\" --env OPENSPACE_LLM_API_KEY=\"$OPENSPACE_LLM_API_KEY\" --env OPENSPACE_LLM_API_BASE=\"$OPENSPACE_LLM_API_BASE\" --env OPENSPACE_LLM_EXTRA_HEADERS=\"$OPENSPACE_LLM_EXTRA_HEADERS\" --env OPENSPACE_LLM_CONFIG=\"$OPENSPACE_LLM_CONFIG\" 2>/dev/null; node openclaw.mjs plugins install /opt/openclaw-local-plugins/pinchtab-src >/dev/null 2>&1 || true; exec node openclaw.mjs gateway --bind ${OPENCLAW_BIND:-lan} --port 18889 --allow-unconfigured",
      ]

networks:
  default:
    driver: bridge

volumes:
  pinchtab-data:
  openspace-skills:
  openspace-workspace:
